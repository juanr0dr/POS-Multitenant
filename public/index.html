<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Commerce - Ingreso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-light d-flex align-items-center auth-body">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 col-xl-4">
                
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary-custom">SaaS Commerce</h2>
                    <p class="text-muted">Gestiona tu tienda aislada</p>
                </div>

                <div class="card shadow-sm border-0 auth-card">
                    <div class="card-body p-4 p-sm-5">
                        
                        <ul class="nav nav-pills nav-justified mb-4 custom-tabs" id="pills-tab" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#pills-login">Iniciar sesión</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#pills-register">Unirse</button>
                            </li>
                        </ul>
                        
                        <div class="tab-content">
                            <div class="tab-pane fade show active" id="pills-login">
                                <form id="loginForm">
                                    <div class="mb-3">
                                        <label class="form-label text-dark fw-semibold">Email</label>
                                        <input type="email" id="loginEmail" class="form-control custom-input" required>
                                    </div>
                                    <div class="mb-3 position-relative">
                                        <label class="form-label text-dark fw-semibold">Contraseña</label>
                                        <input type="password" id="loginPassword" class="form-control custom-input pe-5" autocomplete="new-password" required>
                                        <button type="button" class="btn btn-link position-absolute end-0 bottom-0 text-decoration-none fw-semibold text-primary-custom toggle-password" style="margin-bottom: 2px;">
                                            Mostrar
                                        </button>
                                    </div>
                                    
                                    <div class="mb-4">
                                        <a href="#" class="text-decoration-none fw-semibold text-primary-custom small">¿Has olvidado tu contraseña?</a>
                                    </div>

                                    <div class="form-check mb-4">
                                        <input class="form-check-input custom-checkbox" type="checkbox" id="rememberMe">
                                        <label class="form-check-label text-dark" for="rememberMe">
                                            Mantener sesión iniciada
                                        </label>
                                    </div>

                                    <button class="btn btn-primary-custom w-100 rounded-pill py-2 fw-bold fs-5" type="submit">Iniciar sesión</button>
                                </form>
                            </div>

                            <div class="tab-pane fade" id="pills-register">
                                <form id="registerForm">
                                    <div class="mb-3">
                                        <label class="form-label text-dark fw-semibold">Nombre de la Tienda</label>
                                        <input type="text" id="regStoreName" class="form-control custom-input" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label text-dark fw-semibold">Slug URL</label>
                                        <input type="text" id="regSlug" class="form-control custom-input" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label text-dark fw-semibold">Email</label>
                                        <input type="email" id="regEmail" class="form-control custom-input" required>
                                    </div>
                                    <div class="mb-3 position-relative">
                                        <label class="form-label text-dark fw-semibold">Contraseña</label>
                                        <input type="password" id="regPassword" class="form-control custom-input pe-5" autocomplete="new-password" required>
                                        <button type="button" class="btn btn-link position-absolute end-0 bottom-0 text-decoration-none text-dark toggle-password-icon" style="margin-bottom: 2px;">
                                            <i class="bi bi-eye-fill fs-5"></i>
                                        </button>
                                    </div>

                                    <p class="text-muted small mb-4 text-center">
                                        Al hacer clic en «Aceptar y unirse», aceptas las <a href="#" class="text-decoration-none text-primary-custom fw-semibold">Condiciones de uso</a> y la <a href="#" class="text-decoration-none text-primary-custom fw-semibold">Política de privacidad</a>.
                                    </p>

                                    <button class="btn btn-primary-custom w-100 rounded-pill py-2 fw-bold fs-5" type="submit">Aceptar y unirse</button>
                                </form>
                            </div>
                        </div>

                        <div id="authAlert" class="alert mt-4 d-none text-center"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
